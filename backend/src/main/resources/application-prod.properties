spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# ── Banco de dados (PostgreSQL) ───────────────────────────────
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/acessus}
spring.datasource.username=${DB_USER:acessus_user}
spring.datasource.password=${DB_PASSWORD}

# ── JPA ───────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── E-mail ────────────────────────────────────────────────────
spring.mail.host=smtp.office365.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from=${MAIL_FROM:${spring.mail.username}}

# ── Servidor ──────────────────────────────────────────────────
server.address=0.0.0.0
server.port=${PORT:8080}

# ── Upload ────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

# ── Uploads ──────────────────────────────────────────────────
app.upload-dir=/opt/acessus/uploads

# ── URLs (definir como variável de ambiente) ──────────────────
app.base-url=${BASE_URL}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# ── Google OAuth ───────────────────────────────────────────────
google.client-id=${GOOGLE_CLIENT_ID}
google.client-secret=${GOOGLE_CLIENT_SECRET}
google.refresh-token=${GOOGLE_REFRESH_TOKEN}

# ── Dysrup ─────────────────────────────────────────────────────
dysrup.email=${DYSRUP_EMAIL}
dysrup.password=${DYSRUP_PASSWORD}
