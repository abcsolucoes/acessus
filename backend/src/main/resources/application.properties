spring.application.name=Accessus

# Lê o .env da raiz do repo (mesmo arquivo usado no deploy) igual um .properties —
# assim as variáveis de dev (JWT_SECRET, SOFFICE_PATH etc.) não precisam ser setadas
# na sessão do terminal toda vez; "optional:" faz o Spring ignorar se o arquivo não existir
spring.config.import=optional:file:../.env[.properties]

# Limite de upload — fotos de câmera chegam a 8MB
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB
spring.profiles.active=test
spring.jpa.open-in-view=true

app.jwt.secret=${JWT_SECRET}
app.base-url=http://localhost:5173
app.soffice.path=${SOFFICE_PATH:soffice}
app.dev-email=${DEV_EMAIL:gabriel.oliveira@solucoesabc.com.br,gabrielverdende@gmail.com}
app.cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:5173,http://127.0.0.1:5173,http://192.168.10.222:5173

# ── Google OAuth ───────────────────────────────────────────────
google.client-id=${GOOGLE_CLIENT_ID:}
google.client-secret=${GOOGLE_CLIENT_SECRET:}
google.refresh-token=${GOOGLE_REFRESH_TOKEN:}
