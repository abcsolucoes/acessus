spring.servlet.multipart.max-request-size=15MB
spring.profiles.active=test
spring.jpa.open-in-view=true

app.jwt.secret=${JWT_SECRET}
app.base-url=http://localhost:5173
app.dev-email=${DEV_EMAIL:gabriel.oliveira@solucoesabc.com.br,gabrielverdende@gmail.com}
app.cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:5173,http://127.0.0.1:5173,http://192.168.10.222:5173

# ── Google OAuth ───────────────────────────────────────────────
google.client-id=${GOOGLE_CLIENT_ID:}
